server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent caching of runtime environment config
    location = /env.js {
        # Exact match has highest priority, processed before regex below
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static file caching — tune values as needed
    location ~* ^(?!/env\.js$).*\.(?:css|js|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
